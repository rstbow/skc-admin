<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU Compass Admin — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #f97316;
    --orange-dark: #ea580c;
    --bg: #09090f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.13);
    --text: #f0f0f8;
    --text-muted: #9090a8;
    --text-dim: #555568;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 380px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; color: white;
  }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .brand-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; }
  label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; margin-top: 14px; }
  input {
    width: 100%;
    padding: 11px 13px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border 0.15s;
  }
  input:focus { border-color: var(--orange); }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 12px 14px;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--orange-dark); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    margin-top: 16px;
    display: none;
  }
  .error.show { display: block; }
  .footer { margin-top: 22px; font-size: 11px; color: var(--text-dim); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo-mark">SC</div>
      <div>
        <div class="brand-name">SKU Compass</div>
        <div class="brand-sub">Admin</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <div class="subtitle">Internal admin console</div>

    <form id="loginForm" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="username" autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <button type="submit" id="submitBtn">Sign in</button>

      <div class="error" id="errorBox"></div>
    </form>

    <div class="footer">SKU Compass Admin • Internal use only</div>
  </div>

<script>
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || 'Sign in failed');
      }

      sessionStorage.setItem('skc_admin_token', data.token);
      sessionStorage.setItem('skc_admin_user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
