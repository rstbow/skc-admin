<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU Compass Admin — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
</head>
<body data-page="dashboard">
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-sub">System health + recent activity</div>
      </div>
    </div>
    <div class="page-content">
      <div id="alertBox"></div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-label">Connectors</div><div class="stat-value" id="sActiveConnectors">—</div><div class="stat-sub">active</div></div>
        <div class="stat-card"><div class="stat-label">Endpoints</div><div class="stat-value" id="sActiveEndpoints">—</div><div class="stat-sub">active</div></div>
        <div class="stat-card"><div class="stat-label">Brands</div><div class="stat-value" id="sActiveBrands">—</div><div class="stat-sub">active</div></div>
        <div class="stat-card"><div class="stat-label">Jobs</div><div class="stat-value" id="sActiveJobs">—</div><div class="stat-sub">scheduled</div></div>
        <div class="stat-card"><div class="stat-label">Runs (24h)</div><div class="stat-value" id="sRuns24">—</div><div class="stat-sub" id="sFails24">— failed</div></div>
      </div>

      <div class="card">
        <h2>Recent runs</h2>
        <div class="subtitle">Latest 10 job runs across all connectors</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Started</th><th>Connector</th><th>Endpoint</th><th>Status</th><th>Duration</th><th>Rows</th>
              </tr>
            </thead>
            <tbody id="recentRunsBody">
              <tr><td colspan="6" class="empty-state">No runs yet. Workers ship in Phase 3.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

<script src="/sidebar.js"></script>
<script>
  document.addEventListener('sidebarReady', async () => {
    const { api } = window._SKCAdmin;
    try {
      const [{ stats }, { runs }] = await Promise.all([
        api('GET', '/api/runs/stats'),
        api('GET', '/api/runs?limit=10'),
      ]);

      document.getElementById('sActiveConnectors').textContent = stats.ActiveConnectors;
      document.getElementById('sActiveEndpoints').textContent  = stats.ActiveEndpoints;
      document.getElementById('sActiveBrands').textContent     = stats.ActiveBrands;
      document.getElementById('sActiveJobs').textContent       = stats.ActiveJobs;
      document.getElementById('sRuns24').textContent           = stats.RunsLast24h;
      const fails = stats.FailsLast24h;
      const failEl = document.getElementById('sFails24');
      failEl.textContent = fails + ' failed';
      if (fails > 0) failEl.style.color = 'var(--red)';

      if (runs.length) {
        const tbody = document.getElementById('recentRunsBody');
        tbody.innerHTML = runs.map(r => `
          <tr>
            <td class="mono">${new Date(r.StartedAt).toLocaleString()}</td>
            <td>${escapeHtml(r.ConnectorDisplay)}</td>
            <td>${escapeHtml(r.EndpointDisplay)}</td>
            <td><span class="badge badge-${statusBadge(r.Status)}">${r.Status}</span></td>
            <td class="mono">${r.DurationMs ? (r.DurationMs/1000).toFixed(1)+'s' : '—'}</td>
            <td class="mono">${r.RowsIngested ?? '—'}</td>
          </tr>
        `).join('');
      }
    } catch (e) {
      document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">'+escapeHtml(e.message)+'</div>';
    }
  });

  function statusBadge(s) {
    return s === 'SUCCESS' ? 'green'
         : s === 'FAILED'  ? 'red'
         : s === 'RUNNING' ? 'blue'
         : s === 'PARTIAL' ? 'yellow'
         : 'muted';
  }
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
