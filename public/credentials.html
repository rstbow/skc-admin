<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU Compass Admin — Credentials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
</head>
<body data-page="credentials">
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Credentials</div>
        <div class="topbar-sub" id="topSub">Per-brand API auth material (encrypted at rest)</div>
      </div>
      <button class="btn" id="newBtn" style="display:none" onclick="openModal()">+ Add Credential</button>
    </div>
    <div class="page-content">
      <div id="alertBox"></div>

      <div class="card" id="brandPicker">
        <h2>Pick a brand</h2>
        <div class="subtitle">Credentials are scoped per brand × connector.</div>
        <div id="brandList"></div>
      </div>

      <div class="table-wrap" id="credTable" style="display:none">
        <table>
          <thead>
            <tr><th>Connector</th><th>Account Identifier</th><th>Secrets</th><th>Status</th><th>Last Authed</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Credential</h2>
      <div class="subtitle" id="modalSub"></div>
      <form id="form">
        <label>Connector <span style="color:var(--red)">*</span></label>
        <select id="fConnectorUID" required></select>

        <label>Account identifier</label>
        <input type="text" id="fAccountIdentifier" placeholder="Amazon Seller ID or Shopify shop domain" maxlength="200">

        <label>Marketplace IDs</label>
        <input type="text" id="fMarketplaceIDs" placeholder="ATVPDKIKX0DER" maxlength="500">

        <label>Refresh token / Access token (secret)</label>
        <input type="password" id="fRefreshToken" placeholder="paste and Save — shown only once; never read back" autocomplete="off">
        <div class="help-text">Existing value stays unless you type a new one. Empty string = clear.</div>

        <label>API key / Shopify shpat_ token (secret)</label>
        <input type="password" id="fApiKey" placeholder="shpat_xxxxxxxxxxxx" autocomplete="off">

        <label>App secret / HMAC shared secret (secret)</label>
        <input type="password" id="fAppSecret" placeholder="Used for webhook HMAC verification" autocomplete="off">

        <label>Extra config (JSON, optional)</label>
        <textarea id="fExtraConfig" placeholder='{"shop_domain":"brand.myshopify.com","plan_tier":"plus"}'></textarea>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn" id="submitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

<script src="/sidebar.js"></script>
<script>
  let brands = [];
  let connectors = [];
  let creds = [];
  let selectedBrand = null;

  document.addEventListener('sidebarReady', async () => {
    try {
      const { api } = window._SKCAdmin;
      const [bs, cs] = await Promise.all([
        api('GET', '/api/brands'),
        api('GET', '/api/connectors'),
      ]);
      brands = bs.brands.filter(b => b.IsActive);
      connectors = cs.connectors.filter(c => c.IsActive);

      const params = new URLSearchParams(window.location.search);
      const initialUID = params.get('brandUID');
      if (initialUID) {
        selectedBrand = brands.find(b => b.BrandUID.toLowerCase() === initialUID.toLowerCase());
        if (selectedBrand) return loadCreds();
      }
      renderBrandPicker();
    } catch (e) {
      document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div>';
    }
  });

  function renderBrandPicker() {
    if (!brands.length) {
      document.getElementById('brandList').innerHTML = '<div class="empty-state">No brands yet. Add one on the Brands page first.</div>';
      return;
    }
    document.getElementById('brandList').innerHTML = brands.map(b => `
      <a class="nav-item" style="margin:2px 0;padding:10px 12px" href="/credentials.html?brandUID=${encodeURIComponent(b.BrandUID)}">
        <span class="nav-icon">◇</span>
        <div style="flex:1">
          <div style="color:var(--text);font-weight:500">${esc(b.BrandName)}</div>
          <div class="mono" style="font-size:11px;color:var(--text-dim)">${esc(b.BrandSlug)} · ${b.CredentialCount} credential${b.CredentialCount === 1 ? '' : 's'}</div>
        </div>
      </a>
    `).join('');
  }

  async function loadCreds() {
    document.getElementById('brandPicker').style.display = 'none';
    document.getElementById('credTable').style.display = '';
    document.getElementById('newBtn').style.display = '';
    document.getElementById('topSub').innerHTML = 'Credentials for <strong>' + esc(selectedBrand.BrandName) + '</strong> &nbsp;·&nbsp; <a href="/credentials.html">change brand</a>';
    try {
      const { api } = window._SKCAdmin;
      const data = await api('GET', '/api/credentials?brandUID=' + encodeURIComponent(selectedBrand.BrandUID));
      creds = data.credentials;
      render();
    } catch (e) { alert('Load failed: ' + e.message); }
  }

  function render() {
    const tbody = document.getElementById('tbody');
    if (!creds.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No credentials yet for this brand. Click “+ Add Credential”.</td></tr>';
      return;
    }
    tbody.innerHTML = creds.map(c => {
      const secrets = [];
      if (c.hasRefreshToken) secrets.push('refresh');
      if (c.hasApiKey)        secrets.push('api_key');
      if (c.hasAppSecret)     secrets.push('app_secret');
      const secretStr = secrets.length ? secrets.map(s => `<span class="badge badge-muted" style="margin-right:4px">${s}</span>`).join('') : '<span style="color:var(--text-dim)">none</span>';
      return `
        <tr>
          <td>${esc(c.connectorDisplay)}</td>
          <td class="mono">${esc(c.accountIdentifier || '—')}</td>
          <td>${secretStr}</td>
          <td>${c.isActive ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-muted">Inactive</span>'}</td>
          <td class="mono" style="font-size:11px;color:var(--text-muted)">${c.lastAuthedAt ? new Date(c.lastAuthedAt).toLocaleString() : '—'}</td>
          <td style="text-align:right">
            <button class="btn btn-small btn-secondary" onclick="openModal('${c.connectorUID}')">Edit</button>
            ${c.isActive ? `<button class="btn btn-small btn-danger" onclick="deactivate(${c.credentialID})">Deactivate</button>` : ''}
          </td>
        </tr>`;
    }).join('');
  }

  function openModal(existingConnectorUID) {
    const modal = document.getElementById('modal');
    const form = document.getElementById('form');
    form.reset();
    const sel = document.getElementById('fConnectorUID');
    sel.innerHTML = connectors.map(c => `<option value="${c.ConnectorUID}">${esc(c.DisplayName)}</option>`).join('');
    document.getElementById('modalSub').textContent = 'Brand: ' + selectedBrand.BrandName;
    if (existingConnectorUID) {
      const c = creds.find(x => x.connectorUID === existingConnectorUID);
      if (c) {
        document.getElementById('modalTitle').textContent = 'Edit Credential';
        sel.value = c.connectorUID;
        sel.disabled = true;
        document.getElementById('fAccountIdentifier').value = c.accountIdentifier || '';
        document.getElementById('fMarketplaceIDs').value = c.marketplaceIDs || '';
        document.getElementById('fExtraConfig').value = c.extraConfig || '';
        // Secret fields always start empty; user types to rotate.
      }
    } else {
      document.getElementById('modalTitle').textContent = 'Add Credential';
      sel.disabled = false;
    }
    modal.classList.add('show');
  }
  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
      const { api } = window._SKCAdmin;
      const payload = {
        brandUID: selectedBrand.BrandUID,
        connectorUID: document.getElementById('fConnectorUID').value,
        accountIdentifier: document.getElementById('fAccountIdentifier').value || null,
        marketplaceIDs: document.getElementById('fMarketplaceIDs').value || null,
        extraConfig: document.getElementById('fExtraConfig').value || null,
      };
      // Only include secret fields the user actually typed, so we don't clobber existing ones with empty strings.
      const rt = document.getElementById('fRefreshToken').value;
      const ak = document.getElementById('fApiKey').value;
      const as = document.getElementById('fAppSecret').value;
      if (rt) payload.refreshToken = rt;
      if (ak) payload.apiKey = ak;
      if (as) payload.appSecret = as;

      await api('POST', '/api/credentials', payload);
      closeModal();
      await loadCreds();
    } catch (e) {
      alert('Save failed: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  async function deactivate(credID) {
    if (!confirm('Deactivate this credential? You can add a new one later.')) return;
    try {
      await window._SKCAdmin.api('DELETE', '/api/credentials/' + credID);
      await loadCreds();
    } catch (e) { alert('Deactivate failed: ' + e.message); }
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
