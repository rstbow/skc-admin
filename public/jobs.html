    /* ---------- Endpoint cards (grouped by connector source) ---------- */
    function renderEndpoints(){
      const search = (document.getElementById('endpointSearchInput')?.value || '').toLowerCase().trim();
      const showInactive = document.getElementById('endpointShowInactive')?.checked;
      const host = document.getElementById('endpointContainer');

      const visible = endpointGroupsCache.filter(g => {
        if (!showInactive && !g.endpoint.EndpointIsActive) return false;
        if (search) {
          const hay = (g.endpoint.EndpointName + ' ' + g.endpoint.EndpointDisplay + ' ' +
                       g.endpoint.ConnectorDisplay).toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
      document.getElementById('endpointCount').textContent = visible.length + ' of ' + endpointGroupsCache.length + ' endpoints';

      if (!visible.length) {
        host.innerHTML = '<div class="empty">No endpoints match the current filter.</div>';
        return;
      }

      // Group endpoints by ConnectorName so each source gets its own
      // collapsible section with branded color/icon.
      const byConn = new Map();
      for (const g of visible) {
        const key = g.endpoint.ConnectorName || '_';
        if (!byConn.has(key)) {
          byConn.set(key, {
            connectorName: key,
            connectorDisplay: g.endpoint.ConnectorDisplay || key,
            groups: [],
            counts: { ok:0, fail:0, running:0, paused:0, neverRun:0, brands:0 },
          });
        }
        byConn.get(key).groups.push(g);
        for (const j of g.jobs) {
          const s = jobStatusFromGroup(j);
          const c = byConn.get(key).counts;
          c.brands++;
          if (s === 'RUNNING') c.running++;
          else if (s === 'FAILED') c.fail++;
          else if (s === 'SUCCESS') c.ok++;
          else if (s === 'PAUSED') c.paused++;
          else c.neverRun++;
        }
      }

      // Stable connector order — primary connectors first, then alpha.
      const order = ['AMAZON_SP_API','SHOPIFY','WALMART','QBO','QUICKBOOKS','ETSY','EBAY'];
      const sections = Array.from(byConn.values()).sort((a, b) => {
        const ai = order.indexOf(a.connectorName); const bi = order.indexOf(b.connectorName);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1; if (bi >= 0) return 1;
        return a.connectorDisplay.localeCompare(b.connectorDisplay);
      });

      host.innerHTML = sections.map(sec => {
        const collapseKey = 'conn:' + sec.connectorName;
        const isColl = isCollapsed(collapseKey);
        const headerPills = [
          sec.counts.running  ? `<span class="stats-pill warn">${sec.counts.running} running</span>` : '',
          sec.counts.fail     ? `<span class="stats-pill fail">${sec.counts.fail} failing</span>` : '',
          sec.counts.ok       ? `<span class="stats-pill ok">${sec.counts.ok} ok</span>` : '',
          sec.counts.paused   ? `<span class="stats-pill">${sec.counts.paused} paused</span>` : '',
          sec.counts.neverRun ? `<span class="stats-pill">${sec.counts.neverRun} new</span>` : '',
        ].filter(Boolean).join(' ');

        const cards = sec.groups.map(g => renderEndpointCard(g)).join('');

        return `
          <div class="conn-section ${isColl ? 'collapsed' : ''}" data-connector="${escape(sec.connectorName)}" data-key="${escape(collapseKey)}">
            <div class="conn-header" onclick="toggleConnSection('${escapeAttr(collapseKey)}')">
              <span class="caret">▾</span>
              <span class="conn-icon">${connIcon(sec.connectorName)}</span>
              <span class="conn-name">${escape(sec.connectorDisplay)}</span>
              <span class="conn-meta">${sec.groups.length} endpoint${sec.groups.length === 1 ? '' : 's'} · ${sec.counts.brands} brand${sec.counts.brands === 1 ? '' : 's'}</span>
              <span style="display:flex;gap:5px">${headerPills}</span>
            </div>
            <div class="conn-body">${cards}</div>
          </div>
        `;
      }).join('');
    }

    /* Renders one endpoint card. Pulled out so the grouping logic stays clean. */
    function renderEndpointCard(g){
      const ep = g.endpoint;
      const counts = { ok:0, fail:0, running:0, paused:0, neverRun:0 };
      for (const j of g.jobs) {
        const s = jobStatusFromGroup(j);
        if (s === 'RUNNING') counts.running++;
        else if (s === 'FAILED') counts.fail++;
        else if (s === 'SUCCESS') counts.ok++;
        else if (s === 'PAUSED') counts.paused++;
        else counts.neverRun++;
      }
      const pills = [
        counts.running  ? `<span class="stats-pill warn">${counts.running} running</span>` : '',
        counts.fail     ? `<span class="stats-pill fail">${counts.fail} failing</span>` : '',
        counts.ok       ? `<span class="stats-pill ok">${counts.ok} ok</span>` : '',
        counts.paused   ? `<span class="stats-pill">${counts.paused} paused</span>` : '',
        counts.neverRun ? `<span class="stats-pill">${counts.neverRun} new</span>` : '',
      ].filter(Boolean).join(' ');

      const cron = ep.DefaultCronExpression ? fmt.cron(ep.DefaultCronExpression) : 'manual';
      const autoChip = ep.AutoCreateOnNewBrand
        ? '<span class="stats-pill ok" title="Auto-create on new brand onboarding">⚡ auto-create</span>'
        : '';
      const inactiveChip = !ep.EndpointIsActive ? '<span class="stats-pill">inactive</span>' : '';

      return `
        <div class="ep-card" onclick="openEndpointDrawer(${ep.EndpointID})">
          <div class="ep-card-icon">${connIcon(ep.ConnectorName)}</div>
          <div>
            <div class="ep-card-title">${escape(ep.EndpointName)} <span style="color:var(--text-muted);font-weight:400">· ${escape(ep.EndpointDisplay || ep.EndpointName)}</span></div>
            <div class="ep-card-sub">
              <code title="${escape(ep.DefaultCronExpression || 'manual')}">${escape(cron)}</code>
              <span style="color:var(--text-dim)">·</span>
              <span>${g.jobs.length} brand${g.jobs.length === 1 ? '' : 's'}</span>
              ${autoChip ? '<span style="color:var(--text-dim)">·</span>' + autoChip : ''}
              ${inactiveChip ? '<span style="color:var(--text-dim)">·</span>' + inactiveChip : ''}
            </div>
          </div>
          <div class="ep-card-pills">${pills || '<span class="stats-pill">no brands</span>'}</div>
        </div>
      `;
    }

    /* Connector section collapse — shares the existing localStorage helpers. */
    function toggleConnSection(key){
      const safe = key.replace(/"/g, '\\"');
      const el = document.querySelector('[data-key="' + safe + '"]');
      if (!el) return;
      const willCollapse = !el.classList.contains('collapsed');
      el.classList.toggle('collapsed', willCollapse);
      setCollapsed(key, willCollapse);
    }

    function jobStatusFromGroup(j) {
      if (j.InFlight > 0) return 'RUNNING';
      if (!j.IsActive) return 'PAUSED';
      if (j.LastRunStatus === 'FAILED') return 'FAILED';
      if (j.LastRunStatus === 'SUCCESS') return 'SUCCESS';
      return 'NEW';
    }

    /* ---------- Endpoint drawer ---------- */
    async function openEndpointDrawer(endpointID){
      currentEndpointID = endpointID;
      currentJobID = null;
      drawerStack = [];
      const group = endpointGroupsCache.find(g => g.endpoint.EndpointID === endpointID);
      if (!group) return;
      const ep = group.endpoint;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerBackdrop').classList.add('open');
      document.getElementById('drawerTitle').textContent = ep.EndpointName;
      document.getElementById('drawerSub').innerHTML =
        escape(ep.ConnectorDisplay) + ' · ' + escape(ep.EndpointDisplay || ep.EndpointName);

      const params = ep.DefaultParams || '(none)';
      const cron = ep.DefaultCronExpression || '(manual / no cron)';

      const brandRowsHTML = group.jobs.length ? group.jobs.map(j => {
        const status = jobStatusFromGroup(j);
        const cls = status.toLowerCase();
        const lastRun = j.LastRunAt ? fmt.rel(j.LastRunAt) : 'never';
        const overrideTag = j.Params ? '<span style="color:var(--text-dim);font-size:10px;font-family:Space Mono,monospace">override</span>' : '';
        const meta =
          status === 'RUNNING' ? '<span style="color:var(--blue)">running…</span>' :
          status === 'FAILED'  ? `<span class="err">✗ ${escape((j.LastErrorMessage||'error').slice(0,40))}</span>` :
          status === 'SUCCESS' ? `✓ ${lastRun}` :
          status === 'PAUSED'  ? 'paused' : 'never run';
        return `
          <div class="ep-brand-row" onclick="openBrandFromEndpoint(${j.JobID})">
            <span class="status-dot ${cls}"></span>
            <div class="name">${escape(j.BrandName || '—')} ${overrideTag}</div>
            <div class="meta">${meta}</div>
            <div style="text-align:right">
              <button class="btn-icon" data-runjob="${j.JobID}" title="Run now"
                      onclick="event.stopPropagation();runNow(${j.JobID})">▶</button>
            </div>
          </div>
        `;
      }).join('') : '<div class="empty" style="padding:14px">No brands attached yet.</div>';

      document.getElementById('drawerBody').innerHTML = `
        <h4 style="margin:0 0 8px 0;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Schedule</h4>
        <div class="ep-defaults" style="padding-top:6px;padding-bottom:6px">
          ${renderCronPickerHTML(ep.EndpointID, ep.DefaultCronExpression)}
        </div>

        <h4 style="margin:14px 0 8px 0;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Endpoint defaults (profile)</h4>
        <div class="ep-defaults">
          <div class="ep-defaults-row"><span class="k">Timezone</span><span class="v">${escape(ep.DefaultTimezoneIANA || 'America/Chicago')}</span></div>
          <div class="ep-defaults-row"><span class="k">Params</span><span class="v">${escape(params)}</span></div>
          <div class="ep-defaults-row"><span class="k">Execution mode</span><span class="v">${escape(ep.DefaultExecutionMode || 'NODE_NATIVE')}</span></div>
          <div class="ep-defaults-row"><span class="k">Job type</span><span class="v">${escape(ep.DefaultJobType || 'INGEST')}</span></div>
          <div class="ep-defaults-row"><span class="k">Default IsActive</span><span class="v">${ep.DefaultIsActive ? 'true' : 'false'}</span></div>
          <div class="ep-defaults-row"><span class="k">Auto-create on new brand</span><span class="v">${ep.AutoCreateOnNewBrand ? '⚡ yes — onboarding bundle provisions this for new brands' : 'no'}</span></div>
        </div>

        <h4 style="margin:18px 0 8px 0;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Brands attached (${group.jobs.length})</h4>
        ${brandRowsHTML}

        <p style="color:var(--text-dim);font-size:11px;margin-top:14px">
          Click a brand row for run history + per-brand actions. The ▶ button on the right runs the brand's job immediately.
        </p>
      `;
    }

    /* ---------- Visual cron picker (drawer) ----------
       Translates between humanized presets and a cron string. The user
       can stay in preset mode for the common cases or pop into "Custom"
       to type a raw expression. We display the live cron preview so it's
       always clear what gets stored. */
    const CRON_PRESETS = [
      { label: 'Every hour',         expr: '0 * * * *' },
      { label: 'Every 2 hours',      expr: '0 */2 * * *' },
      { label: 'Every 4 hours',      expr: '0 */4 * * *' },
      { label: 'Every 6 hours',      expr: '0 */6 * * *' },
      { label: 'Every 12 hours',     expr: '0 */12 * * *' },
      { label: 'Daily at 3am',       expr: '0 3 * * *' },
      { label: 'Daily at 5am',       expr: '0 5 * * *' },
      { label: 'Daily at 8am',       expr: '0 8 * * *' },
      { label: 'Weekdays at 8am',    expr: '0 8 * * 1-5' },
      { label: 'Sundays at midnight', expr: '0 0 * * 0' },
    ];
    function renderCronPickerHTML(endpointID, currentExpr){
      const preset = CRON_PRESETS.find(p => p.expr === (currentExpr || '').trim());
      const mode = preset ? 'preset' : (currentExpr ? 'custom' : 'manual');
      const exprAttr = escape(currentExpr || '');
      return `
        <div class="cron-picker">
          <span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">When</span>
          <select id="cronModeSelect" onchange="onCronModeChange(${endpointID})">
            <option value="manual"${mode === 'manual' ? ' selected' : ''}>Manual only — no schedule</option>
            ${CRON_PRESETS.map(p => `<option value="preset:${escape(p.expr)}"${mode === 'preset' && preset.expr === p.expr ? ' selected' : ''}>${escape(p.label)}</option>`).join('')}
            <option value="custom"${mode === 'custom' ? ' selected' : ''}>Custom cron expression…</option>
          </select>
          <span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em" id="cronCustomLbl" style="display:${mode === 'custom' ? '' : 'none'}">Cron</span>
          <input id="cronCustomInput" type="text" placeholder="e.g. 0 */4 * * *" value="${exprAttr}" style="display:${mode === 'custom' ? '' : 'none'};font-family:'Space Mono',monospace" oninput="updateCronPreview()">
          <div class="cron-preview" id="cronPreview">
            ${currentExpr ? '→ ' + escape(currentExpr) + '   <span style="color:var(--text-muted)">(' + escape(fmt.cron(currentExpr)) + ')</span>' : '→ no schedule (manual fires only)'}
          </div>
          <span></span>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-small" id="cronSaveBtn" onclick="saveCron(${endpointID})" disabled style="opacity:.5">Save schedule</button>
            <span id="cronSaveStatus" style="font-size:11px;color:var(--text-muted)"></span>
          </div>
        </div>
      `;
    }
    function readCronExpr(){
      const mode = document.getElementById('cronModeSelect').value;
      if (mode === 'manual') return null;
      if (mode === 'custom') {
        const v = (document.getElementById('cronCustomInput').value || '').trim();
        return v || null;
      }
      // preset:<expr>
      return mode.replace(/^preset:/, '');
    }
    function onCronModeChange(endpointID){
      const mode = document.getElementById('cronModeSelect').value;
      const inp = document.getElementById('cronCustomInput');
      const lbl = document.getElementById('cronCustomLbl');
      const isCustom = mode === 'custom';
      inp.style.display = isCustom ? '' : 'none';
      if (lbl) lbl.style.display = isCustom ? '' : 'none';
      if (mode.startsWith('preset:')) {
        inp.value = mode.replace(/^preset:/, '');
      } else if (mode === 'manual') {
        inp.value = '';
      }
      enableCronSaveIfDirty(endpointID);
      updateCronPreview();
    }
    function updateCronPreview(){
      const expr = readCronExpr();
      const el = document.getElementById('cronPreview');
      if (!expr) {
        el.innerHTML = '→ no schedule (manual fires only)';
      } else {
        el.innerHTML = '→ ' + escape(expr) + '   <span style="color:var(--text-muted)">(' + escape(fmt.cron(expr)) + ')</span>';
      }
      enableCronSaveIfDirty();
    }
    function enableCronSaveIfDirty(endpointID){
      // Compare against the original on the cached endpoint group
      const btn = document.getElementById('cronSaveBtn');
      if (!btn) return;
      const group = endpointGroupsCache.find(g => g.endpoint.EndpointID === currentEndpointID);
      const original = group ? (group.endpoint.DefaultCronExpression || null) : null;
      const next = readCronExpr();
      const dirty = (original || null) !== (next || null);
      btn.disabled = !dirty;
      btn.style.opacity = dirty ? '1' : '.5';
    }
    async function saveCron(endpointID){
      const expr = readCronExpr();
      const status = document.getElementById('cronSaveStatus');
      const btn = document.getElementById('cronSaveBtn');
      btn.disabled = true; btn.style.opacity = '.5';
      status.textContent = 'Saving…'; status.style.color = 'var(--text-muted)';
      try {
        // PATCH the endpoint defaults. Existing endpoint route at
        // PATCH /api/endpoints/:uid/defaults takes { defaultCronExpression }
        const group = endpointGroupsCache.find(g => g.endpoint.EndpointID === endpointID);
        if (!group) throw new Error('Endpoint not in cache — refresh page');
        const epUID = group.endpoint.EndpointUID;
        if (!epUID) throw new Error('Endpoint missing UID — backend payload needs EndpointUID added to /api/jobs/by-endpoint');
        await window._SKCAdmin.api('PATCH', '/api/endpoints/' + encodeURIComponent(epUID) + '/defaults', {
          defaultCronExpression: expr,
        });
        status.textContent = '✓ Saved. Reloading…'; status.style.color = 'var(--green)';
        await loadEndpointGroups();
        // Re-render the drawer with fresh data
        openEndpointDrawer(endpointID);
      } catch (e) {
        status.textContent = '✗ ' + e.message; status.style.color = 'var(--red)';
        btn.disabled = false; btn.style.opacity = '1';
      }
    }

    function openBrandFromEndpoint(jobID){
      // Push endpoint onto stack so drawer can offer a back link
      if (currentEndpointID) drawerStack.push({ kind: 'endpoint', id: currentEndpointID });
      openDrawer(jobID);
    }
    async function loadScheduler(){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/jobs/scheduler/status');
        const pill = document.getElementById('schedulerPill');
        const n = d.scheduler.scheduledCount;
        pill.className = 'scheduler-pill ' + (n > 0 ? 'ok' : 'warn');
        pill.innerHTML = '● Scheduler: ' + n + ' job' + (n===1?'':'s') + ' on ' + d.scheduler.workerHost;
      } catch (_) {
        document.getElementById('schedulerPill').innerHTML = '✗ Scheduler offline';
        document.getElementById('schedulerPill').className = 'scheduler-pill warn';
      }
    }
    async function loadJobs(){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/jobs');
        jobsCache = d.jobs || [];
        renderSummary();
        renderTree();
        renderInflight();
      } catch (e) {
        alertError('Failed to load jobs: ' + e.message);
      }
    }

    /* ---------- Summary strip ---------- */
    function renderSummary(){
      const strip = document.getElementById('summaryStrip');
      const byConn = new Map();
      for (const j of jobsCache) {
        if (!byConn.has(j.ConnectorName)) {
          byConn.set(j.ConnectorName, { display: j.ConnectorDisplay, total:0, ok:0, fail:0, running:0, paused:0, neverRun:0 });
        }
        const c = byConn.get(j.ConnectorName);
        c.total++;
        if (j.InFlight > 0) c.running++;
        else if (!j.IsActive) c.paused++;
        else if (j.LastRunStatus === 'FAILED') c.fail++;
        else if (j.LastRunStatus === 'SUCCESS') c.ok++;
        else c.neverRun++;
      }

      if (!byConn.size) { strip.innerHTML = ''; return; }

      strip.innerHTML = Array.from(byConn.values()).map(c => `
        <div class="summary-chip ${c.fail > 0 ? 'has-fail' : ''}">
          <span class="name">${escape(c.display)}</span>
          <span class="count">${c.total} job${c.total===1?'':'s'}</span>
          ${c.running ? `<span class="stats-pill warn">${c.running} running</span>` : ''}
          ${c.fail    ? `<span class="stats-pill fail">${c.fail} failing</span>` : ''}
          ${c.ok      ? `<span class="stats-pill ok">${c.ok} ok</span>` : ''}
          ${c.paused  ? `<span class="stats-pill">${c.paused} paused</span>` : ''}
          ${c.neverRun? `<span class="stats-pill">${c.neverRun} new</span>` : ''}
        </div>
      `).join('');
    }

    /* ---------- Tree render ---------- */
    function renderTree(){
      const container = document.getElementById('treeContainer');
      const showPaused = document.getElementById('showPaused').checked;
      const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      const statusFilter = document.getElementById('filterStatus').value;

      const visible = jobsCache.filter(j => {
        if (!showPaused && !j.IsActive) return false;
        if (statusFilter && jobStatus(j) !== statusFilter) return false;
        if (search){
          const hay = ((j.Name||'') + ' ' + (j.BrandName||'') + ' ' + (j.EndpointName||'') + ' ' + (j.ConnectorDisplay||'') + ' ' + (j.JobType||'')).toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });

      document.getElementById('jobCount').textContent = '(' + visible.length + ' of ' + jobsCache.length + ')';

      if (!visible.length){
        container.innerHTML = '<div class="empty">No jobs match the current filter.' +
          (jobsCache.length === 0 ? ' Run migration 020 (or later) to seed jobs.' : '') + '</div>';
        return;
      }

      // Group: connector → endpoint|jobtype → job
      const byConn = new Map();
      for (const j of visible) {
        if (!byConn.has(j.ConnectorName)) {
          byConn.set(j.ConnectorName, { display: j.ConnectorDisplay, endpoints: new Map() });
        }
        const conn = byConn.get(j.ConnectorName);
        const subkey = j.EndpointName + '|' + j.JobType;
        if (!conn.endpoints.has(subkey)) {
          conn.endpoints.set(subkey, {
            endpointName: j.EndpointName,
            endpointDisplay: j.EndpointDisplay,
            jobType: j.JobType,
            cron: j.CronExpression,
            jobs: []
          });
        }
        conn.endpoints.get(subkey).jobs.push(j);
      }

      let html = '';
      for (const [connName, conn] of byConn) {
        const allJobs = Array.from(conn.endpoints.values()).flatMap(e => e.jobs);
        const counts = { ok:0, fail:0, running:0, paused:0, neverRun:0 };
        for (const j of allJobs) {
          const s = jobStatus(j);
          if (s === 'RUNNING') counts.running++;
          else if (s === 'FAILED') counts.fail++;
          else if (s === 'SUCCESS') counts.ok++;
          else if (s === 'PAUSED') counts.paused++;
          else counts.neverRun++;
        }

        // Same breakdown as the top summary chips so the header tells the
        // same story without needing to expand.
        const groupPills = [
          counts.running  ? `<span class="stats-pill warn">${counts.running} running</span>` : '',
          counts.fail     ? `<span class="stats-pill fail">${counts.fail} failing</span>` : '',
          counts.ok       ? `<span class="stats-pill ok">${counts.ok} ok</span>` : '',
          counts.paused   ? `<span class="stats-pill">${counts.paused} paused</span>` : '',
          counts.neverRun ? `<span class="stats-pill">${counts.neverRun} new</span>` : '',
        ].filter(Boolean).join(' ');

        const connKey = 'conn:' + connName;
        const connCollapsed = isCollapsed(connKey);

        html += `
          <div class="tree-group ${connCollapsed ? 'collapsed' : ''}" data-key="${escapeAttr(connKey)}">
            <div class="tree-group-header" onclick="toggleGroup('${escapeAttr(connKey)}')">
              <span class="caret">▼</span>
              <span style="font-weight:600">${escape(conn.display)}</span>
              <span style="color:var(--text-muted);font-size:12px">· ${allJobs.length} jobs</span>
              <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">${groupPills}</span>
            </div>
            <div class="tree-group-body">
        `;

        for (const [subkey, ep] of conn.endpoints) {
          const epKey = 'ep:' + connName + ':' + subkey;
          const epCollapsed = isCollapsed(epKey);
          const cronHuman = fmt.cron(ep.cron);

          // Per-endpoint status breakdown — same pill set as the connector
          // header + summary strip, just narrower scope.
          const epCounts = { ok:0, fail:0, running:0, paused:0, neverRun:0 };
          for (const j of ep.jobs) {
            const s = jobStatus(j);
            if (s === 'RUNNING') epCounts.running++;
            else if (s === 'FAILED') epCounts.fail++;
            else if (s === 'SUCCESS') epCounts.ok++;
            else if (s === 'PAUSED') epCounts.paused++;
            else epCounts.neverRun++;
          }
          const epPills = [
            epCounts.running  ? `<span class="stats-pill warn">${epCounts.running} running</span>` : '',
            epCounts.fail     ? `<span class="stats-pill fail">${epCounts.fail} failing</span>` : '',
            epCounts.ok       ? `<span class="stats-pill ok">${epCounts.ok} ok</span>` : '',
            epCounts.paused   ? `<span class="stats-pill">${epCounts.paused} paused</span>` : '',
            epCounts.neverRun ? `<span class="stats-pill">${epCounts.neverRun} new</span>` : '',
          ].filter(Boolean).join(' ');

          html += `
            <div class="tree-subgroup ${epCollapsed ? 'collapsed' : ''}" data-key="${escapeAttr(epKey)}">
              <div class="tree-subgroup-header" onclick="toggleGroup('${escapeAttr(epKey)}')">
                <span class="caret">▼</span>
                <strong style="color:var(--text)">${escape(ep.endpointName)}</strong>
                <span style="color:var(--text-dim)">·</span>
                <span>${escape(ep.jobType)}</span>
                <span style="color:var(--text-dim)">·</span>
                <span title="${escape(ep.cron || 'manual trigger')}">${escape(cronHuman)}</span>
                <span style="color:var(--text-muted);font-size:11px">· ${ep.jobs.length} brand${ep.jobs.length===1?'':'s'}</span>
                <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">${epPills}</span>
              </div>
              <div class="tree-subgroup-body">
          `;

          for (const j of ep.jobs) {
            const status = jobStatus(j);
            const statusClass = status.toLowerCase();
            const lastRunTxt = j.LastRunAt ? fmt.rel(j.LastRunAt) : 'never';
            const chunkProgress = (j.InFlightChunksTotal && j.InFlightChunksTotal > 0)
              ? 'chunk ' + (j.InFlightChunksCompleted || 0) + '/' + j.InFlightChunksTotal +
                (j.InFlightRowsSoFar ? ' · ' + j.InFlightRowsSoFar.toLocaleString() + ' rows' : '')
              : null;
            const nextRunTxt = (j.NextRunAt && j.IsActive && status !== 'RUNNING')
              ? 'next ' + fmt.rel(j.NextRunAt)
              : '';
            const lastAndNext = [
              status === 'SUCCESS' ? '✓ ' + lastRunTxt + (j.LastSuccessDurationMs ? ' · ' + fmt.dur(j.LastSuccessDurationMs) : '') : null,
              status === 'FAILED'  ? '<span class="err">✗ ' + escape((j.LastErrorMessage||'error').slice(0,60)) + '</span>' : null,
              status === 'RUNNING' ? (chunkProgress || 'running…') : null,
              status === 'PAUSED'  ? 'paused' : null,
              status === 'NEW'     ? 'never run' : null,
              nextRunTxt
            ].filter(Boolean).join(' · ');
            const metaTxt = lastAndNext || '—';
            const consec = j.ConsecutiveFailures > 0 ? '<span class="consec">⚠ ' + j.ConsecutiveFailures + '</span>' : '';

            html += `
              <div class="job-row" onclick="openDrawer(${j.JobID})">
                <span class="status-dot ${statusClass}"></span>
                <div class="brand" title="${escape(j.BrandName || '—')}">${escape(j.BrandName || '—')}${consec}</div>
                <div class="meta">${metaTxt}</div>
                <div class="mode">${escape(j.ExecutionMode)}</div>
                <div class="job-row-actions">
                  <button class="btn-icon" title="Run now" data-runjob="${j.JobID}" onclick="event.stopPropagation();runNow(${j.JobID});">▶</button>
                </div>
              </div>
            `;
          }

          html += `</div></div>`;
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;
    }

    /* ---------- Inflight ---------- */
    function renderInflight(){
      const running = jobsCache.filter(j => j.InFlight > 0);
      document.getElementById('inflightCount').textContent = '(' + running.length + ')';
      const host = document.getElementById('inflightList');
      if (!running.length){
        host.innerHTML = '<div class="empty" style="padding:14px">No jobs currently running</div>';
        return;
      }
      host.innerHTML = running.map(j => {
        const chunkProgress = (j.InFlightChunksTotal && j.InFlightChunksTotal > 0)
          ? 'chunk ' + (j.InFlightChunksCompleted || 0) + '/' + j.InFlightChunksTotal +
            (j.InFlightRowsSoFar ? ' · ' + j.InFlightRowsSoFar.toLocaleString() + ' rows' : '')
          : null;
        return `
          <div class="inflight-row">
            <div><strong>${escape(j.Name || j.EndpointName)}</strong><div style="color:var(--text-muted);font-size:11px">${escape(j.ConnectorDisplay)}</div></div>
            <div>${escape(j.BrandName || '—')}</div>
            <div style="color:var(--text-muted)">started ${fmt.rel(j.LastRunAt)}${chunkProgress ? '<div style=\"font-family:Space Mono,monospace;font-size:11px;color:var(--blue);margin-top:2px\">' + escape(chunkProgress) + '</div>' : ''}</div>
            <div><span class="badge badge-running">RUNNING</span></div>
            <div><button class="btn btn-secondary btn-small" onclick="openDrawer(${j.JobID})">View</button></div>
          </div>
        `;
      }).join('');
    }

    /* ---------- Drawer ---------- */
    async function openDrawer(jobID){
      currentJobID = jobID;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerBackdrop').classList.add('open');
      document.getElementById('drawerBody').innerHTML = 'Loading…';
      try {
        const d = await window._SKCAdmin.api('GET', '/api/jobs/' + jobID);
        renderDrawer(d);
      } catch (e) {
        document.getElementById('drawerBody').innerHTML =
          '<div class="error-box">Failed to load: ' + escape(e.message) + '</div>';
      }
    }
    function closeDrawer(){
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerBackdrop').classList.remove('open');
      currentJobID = null;
      currentEndpointID = null;
      drawerStack = [];
    }

    /* Pop drawer stack — used by the "← Back to endpoint" link in the
       brand drawer to return to the endpoint detail without closing
       the whole drawer. */
    function popDrawerStack(){
      const last = drawerStack.pop();
      if (!last) return closeDrawer();
      if (last.kind === 'endpoint') {
        openEndpointDrawer(last.id);
      }
    }
    function renderDrawer(d){
      const j = d.job;
      document.getElementById('drawerTitle').textContent = j.Name || j.EndpointName;
      document.getElementById('drawerSub').innerHTML =
        escape(j.ConnectorDisplay) + ' · ' + escape(j.EndpointName) +
        ' · ' + escape(j.JobType) +
        ' · brand: ' + escape(j.BrandName || '—');

      const runbookHTML = d.runbook ? `
        <div class="runbook sev-${escape(d.runbook.Severity)}">
          <h4>📖 ${escape(d.runbook.Title)}</h4>
          <div class="label">What it means</div>
          <p>${escape(d.runbook.WhatItMeans)}</p>
          <div class="label">How to fix</div>
          <p>${escape(d.runbook.HowToFix)}</p>
        </div>` : (j.LastErrorMessage ? `
        <div class="runbook sev-WARN">
          <h4>No runbook match</h4>
          <p>This error doesn't match any runbook yet. Once you diagnose it, add a runbook entry in admin.ErrorRunbooks with a LIKE pattern for the error text so the next occurrence self-explains.</p>
        </div>` : '');

      const errorHTML = j.LastErrorMessage ? `
        <h4 style="margin:18px 0 6px 0;font-size:13px">Last error</h4>
        <div class="error-box">${escape(j.LastErrorMessage)}</div>
        ${runbookHTML}
      ` : '';

      const paramsHTML = j.Params ? `
        <div><strong>Params</strong><div style="color:var(--text-muted);font-family:Space Mono,monospace;font-size:11px">${escape(j.Params)}</div></div>
      ` : '';

      const runsHTML = d.runs && d.runs.length ? `
        <h4 style="margin:18px 0 6px 0;font-size:13px">Recent runs</h4>
        <div style="font-size:12px">
          <div class="run-row" style="font-weight:600;color:var(--text-muted);border-bottom:2px solid var(--border-strong)">
            <div>Status</div><div>Started</div><div>Duration</div><div>Rows</div><div></div>
          </div>
          ${d.runs.map(r => `
            <div class="run-row">
              <div><span class="badge badge-${r.Status.toLowerCase()}">${escape(r.Status)}</span></div>
              <div>${fmt.rel(r.StartedAt)}${r.ChunksTotal ? '<div style=\"color:var(--blue);font-size:10px;font-family:Space Mono,monospace\">' + (r.ChunksCompleted||0) + '/' + r.ChunksTotal + ' chunks</div>' : ''}</div>
              <div>${fmt.dur(r.DurationMs)}</div>
              <div>${r.RowsIngested != null ? r.RowsIngested.toLocaleString() : '—'}</div>
              <div style="color:var(--text-muted);font-size:10px">${escape(r.TriggeredBy)}</div>
            </div>
            ${r.ErrorMessage ? '<div style="font-size:11px;color:#fca5a5;padding:4px 0 8px 90px;font-family:Space Mono,monospace">' + escape(r.ErrorMessage.slice(0,300)) + '</div>' : ''}
          `).join('')}
        </div>
      ` : '<p style="color:var(--text-muted)">No runs yet.</p>';

      // Back link if we drilled in from an endpoint drawer
      const backLink = drawerStack.length
        ? '<a class="drawer-back" href="javascript:void(0)" onclick="popDrawerStack()">← Back to ' + escape(j.EndpointName) + '</a>'
        : '';

      document.getElementById('drawerBody').innerHTML = `
        ${backLink}
        <div class="actions" style="margin-bottom:14px">
          <button class="btn" data-runjob="${j.JobID}" onclick="runNow(${j.JobID})">▶ Run now</button>
          ${j.IsActive
            ? '<button class="btn btn-secondary" onclick="pause(' + j.JobID + ')">⏸ Pause</button>'
            : '<button class="btn btn-secondary" onclick="resume(' + j.JobID + ')">▶ Resume</button>'}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;margin-bottom:10px">
          <div><strong>Schedule</strong><div style="color:var(--text-muted)" title="${escape(j.CronExpression||'')}">${escape(fmt.cron(j.CronExpression))}</div></div>
          <div><strong>Next run</strong><div style="color:var(--text-muted)">${j.NextRunAt && j.IsActive ? fmt.rel(j.NextRunAt) : '—'}</div></div>
          <div><strong>Timezone</strong><div style="color:var(--text-muted)">${escape(j.TimezoneIANA||'—')}</div></div>
          <div><strong>Mode</strong><div style="color:var(--text-muted)">${escape(j.ExecutionMode)}</div></div>
          <div><strong>Job type</strong><div style="color:var(--text-muted)">${escape(j.JobType)}</div></div>
          <div><strong>Last run</strong><div style="color:var(--text-muted)">${fmt.rel(j.LastRunAt)}</div></div>
          <div><strong>Consec. failures</strong><div style="color:${j.ConsecutiveFailures>0?'var(--red)':'var(--text-muted)'}">${j.ConsecutiveFailures}</div></div>
          ${paramsHTML}
        </div>

        <!-- Schedule editor -->
        <details style="margin:14px 0;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px">
          <summary style="cursor:pointer;font-weight:600;font-size:13px;color:var(--text)">Edit schedule</summary>
          <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">
            <div style="grid-column:1/3">
              <label style="display:block;margin-bottom:4px;color:var(--text-muted)">Preset</label>
              <select id="schedPreset" onchange="applyPreset(this.value)" style="width:100%;padding:7px 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--text)">
                <option value="">— Choose a preset —</option>
                <option value="*/5 * * * *">every 5 min</option>
                <option value="*/15 * * * *">every 15 min</option>
                <option value="0 * * * *">every hour</option>
                <option value="0 */2 * * *">every 2 hours</option>
                <option value="0 */4 * * *">every 4 hours</option>
                <option value="0 */6 * * *">every 6 hours</option>
                <option value="0 */12 * * *">every 12 hours</option>
                <option value="0 0 * * *">daily midnight</option>
                <option value="0 8 * * *">daily 8am</option>
                <option value="0 0 * * 0">weekly (Sunday)</option>
                <option value="__CLEAR__">(none — manual only)</option>
              </select>
            </div>
            <div>
              <label style="display:block;margin-bottom:4px;color:var(--text-muted)">Cron expression</label>
              <input id="schedCron" type="text" value="${escape(j.CronExpression||'')}" placeholder="0 */6 * * *" style="width:100%;padding:7px 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--text);font-family:'Space Mono',monospace;font-size:12px">
            </div>
            <div>
              <label style="display:block;margin-bottom:4px;color:var(--text-muted)">Timezone (IANA)</label>
              <input id="schedTZ" type="text" value="${escape(j.TimezoneIANA||'America/Chicago')}" placeholder="America/Chicago" style="width:100%;padding:7px 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--text);font-size:12px">
            </div>
            <div style="grid-column:1/3;display:flex;gap:8px;align-items:center;margin-top:4px">
              <button class="btn btn-small" onclick="saveSchedule(${j.JobID})">Save schedule</button>
              <span id="schedStatus" style="font-size:11px;color:var(--text-muted)"></span>
            </div>
            <div style="grid-column:1/3;color:var(--text-dim);font-size:11px">
              Format: <code style="font-family:'Space Mono',monospace">minute hour day month weekday</code>. Use <code>*/N</code> for every-N, <code>0,30</code> for specific values. Changes apply live — scheduler reloads this job immediately after save.
            </div>
          </div>
        </details>

        ${errorHTML}
        ${runsHTML}
      `;
    }

    /* ---------- Actions ---------- */
    // Set of jobIDs currently in flight from the UI. Prevents a user
    // who double-clicks (or panic-clicks during a long run) from
    // queueing two requests to the same job. Server-side has its own
    // rapid-fire guard as a backstop.
    const inFlightFires = new Set();

    function setRunButtonsDisabled(jobID, disabled) {
      // Tag any Run-now button (icon in the row, button in the drawer)
      // with data-runjob so we can flip them all when state changes.
      document.querySelectorAll('[data-runjob="' + jobID + '"]').forEach((btn) => {
        btn.disabled = disabled;
        btn.style.opacity = disabled ? '0.5' : '';
        btn.style.cursor = disabled ? 'not-allowed' : '';
      });
    }

    async function runNow(jobID){
      if (inFlightFires.has(jobID)) {
        // Second click while the first is still in flight — ignore.
        // The visible button is already disabled; this is the safety
        // net for keyboard / programmatic dupes.
        return;
      }
      inFlightFires.add(jobID);
      setRunButtonsDisabled(jobID, true);
      try {
        document.getElementById('alertBox').innerHTML =
          '<div class="alert" style="background:rgba(96,165,250,.14);color:var(--blue);border:1px solid rgba(96,165,250,.35);padding:8px 14px;border-radius:6px;margin-bottom:12px">Firing job ' + jobID + '…</div>';
        const d = await window._SKCAdmin.api('POST', '/api/jobs/' + jobID + '/run');
        if (d.ok) {
          document.getElementById('alertBox').innerHTML =
            '<div class="alert" style="background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);padding:8px 14px;border-radius:6px;margin-bottom:12px">✓ Run ' + d.runID + ' succeeded</div>';
        } else {
          document.getElementById('alertBox').innerHTML =
            '<div class="alert" style="background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.3);padding:8px 14px;border-radius:6px;margin-bottom:12px">✗ Run ' + d.runID + ' failed: ' + escape(d.error||'') + '</div>';
        }
        await loadJobs();
        if (currentJobID) openDrawer(currentJobID);
      } catch (e) {
        alertError('Run failed: ' + e.message);
      } finally {
        inFlightFires.delete(jobID);
        setRunButtonsDisabled(jobID, false);
      }
    }
    function applyPreset(val){
      if (!val) return;
      if (val === '__CLEAR__') {
        document.getElementById('schedCron').value = '';
      } else {
        document.getElementById('schedCron').value = val;
      }
    }
    async function saveSchedule(jobID){
      const cron = document.getElementById('schedCron').value.trim();
      const tz   = document.getElementById('schedTZ').value.trim() || 'America/Chicago';
      const status = document.getElementById('schedStatus');
      status.textContent = 'Saving…';
      try {
        await window._SKCAdmin.api('PATCH', '/api/jobs/' + jobID, {
          cronExpression: cron || null,
          timezoneIANA:   tz,
        });
        status.textContent = '✓ Saved — scheduler reloaded';
        setTimeout(() => { status.textContent = ''; }, 3000);
        await loadJobs();
        if (currentJobID) openDrawer(currentJobID);
      } catch (e) {
        status.textContent = '✗ ' + e.message;
      }
    }

    async function pause(jobID){
      await window._SKCAdmin.api('POST', '/api/jobs/' + jobID + '/pause');
      await loadJobs();
      if (currentJobID) openDrawer(currentJobID);
    }
    async function resume(jobID){
      await window._SKCAdmin.api('POST', '/api/jobs/' + jobID + '/resume');
      await loadJobs();
      if (currentJobID) openDrawer(currentJobID);
    }

    /* ---------- Boot ---------- */
    document.addEventListener('sidebarReady', async () => {
      // Restore saved view preference (defaults to endpoint).
      let saved = 'endpoint';
      try { saved = localStorage.getItem('jobs.view') || 'endpoint'; } catch (_) {}
      const validView = (saved === 'brand' || saved === 'project') ? saved : 'endpoint';
      setView(validView);

      await loadAll();
      if (validView === 'project') await loadProjects();

      // Poll all views every 5s so live status stays fresh regardless of
      // which view the user has open. Projects refresh inline-expanded
      // detail too (loadProjects → loadProjectDetail for each expanded UID).
      pollTimer = setInterval(async () => {
        await Promise.all([ loadJobs(), loadEndpointGroups(), loadProjects() ]);
      }, 5000);
    });
  </script>
</body>
</html>
