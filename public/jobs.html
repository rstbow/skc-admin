<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU Compass Admin — Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<style>
  /* Dark-theme-aware scheduler + summary + tree. Uses tokens from
     /css/tokens.css (--surface, --text, etc.) so all pages stay
     consistent. Status pills keep their semantic color but with
     slightly dimmer backgrounds to not glare on the dark surface. */

  .scheduler-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--surface2);font-size:13px;color:var(--text-muted);border:1px solid var(--border)}
  .scheduler-pill.ok{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.25)}
  .scheduler-pill.warn{background:rgba(251,191,36,.12);color:var(--yellow);border-color:rgba(251,191,36,.25)}

  /* Summary strip — one chip per connector */
  .summary-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .summary-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:10px;color:var(--text)}
  .summary-chip.has-fail{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.05)}
  .summary-chip .name{font-weight:600;color:var(--text)}
  .summary-chip .count{color:var(--text-muted);font-size:12px}

  .stats-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;background:var(--surface3);color:var(--text-muted);font-weight:600;border:1px solid var(--border)}
  .stats-pill.ok{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.25)}
  .stats-pill.warn{background:rgba(251,191,36,.12);color:var(--yellow);border-color:rgba(251,191,36,.25)}
  .stats-pill.fail{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input[type="search"]{padding:8px 12px;border:1px solid var(--border-strong);border-radius:6px;min-width:260px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
  .toolbar input[type="search"]::placeholder{color:var(--text-dim)}
  .toolbar input[type="search"]:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.15)}
  .toolbar select{padding:7px 10px;border:1px solid var(--border-strong);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text)}
  .toolbar select:focus{outline:none;border-color:var(--orange)}
  .toolbar label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);margin:0;cursor:pointer}
  .toolbar .btn-small{padding:6px 10px;font-size:12px}

  /* Tree */
  .tree-group{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;background:var(--surface)}
  .tree-group-header{padding:12px 16px;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;border-bottom:1px solid var(--border);font-size:14px}
  .tree-group-header:hover{background:var(--surface3)}
  .tree-group.collapsed .tree-group-header{border-bottom:none}
  .tree-group.collapsed .tree-group-body{display:none}
  .caret{display:inline-block;width:14px;text-align:center;color:var(--text-muted);transition:transform .15s;font-size:11px}
  .tree-group.collapsed>.tree-group-header .caret,
  .tree-subgroup.collapsed>.tree-subgroup-header .caret{transform:rotate(-90deg)}

  .tree-subgroup{border-top:1px solid var(--border)}
  .tree-subgroup:first-child{border-top:none}
  .tree-subgroup-header{padding:9px 16px 9px 34px;background:var(--surface);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;user-select:none}
  .tree-subgroup-header strong{color:var(--text)}
  .tree-subgroup-header:hover{background:var(--surface2)}
  .tree-subgroup.collapsed .tree-subgroup-body{display:none}

  .job-row{display:grid;grid-template-columns:12px minmax(180px,1.3fr) minmax(200px,2fr) 120px 56px;gap:14px;padding:10px 16px 10px 52px;border-top:1px solid var(--border);cursor:pointer;align-items:center;font-size:13px;color:var(--text)}
  .job-row:hover{background:var(--surface2)}
  .job-row .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .status-dot.success{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
  .status-dot.failed{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,.5)}
  .status-dot.running{background:var(--blue);animation:pulse 1.4s infinite}
  .status-dot.paused{background:var(--text-dim)}
  .status-dot.new{background:var(--border-strong)}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px rgba(96,165,250,.8)}50%{opacity:.5;box-shadow:0 0 2px rgba(96,165,250,.3)}}

  .job-row .brand{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .job-row .meta{color:var(--text-muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .job-row .meta .err{color:var(--red);font-family:'Space Mono',monospace;font-size:11px}
  .job-row .mode{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);text-align:left}
  .job-row-actions{display:flex;gap:4px;justify-content:flex-end}
  .btn-icon{padding:4px 8px;font-size:13px;border:1px solid var(--border-strong);background:var(--surface2);border-radius:5px;cursor:pointer;color:var(--text-muted);line-height:1}
  .btn-icon:hover{background:var(--surface3);border-color:var(--orange);color:var(--orange)}
  .consec{color:var(--red);font-size:11px;font-weight:600;margin-left:4px}

  /* Badges (dark-theme) */
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.02em;border:1px solid transparent}
  .badge-success{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.3)}
  .badge-failed{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}
  .badge-running{background:rgba(96,165,250,.14);color:var(--blue);border-color:rgba(96,165,250,.35)}
  .badge-paused{background:var(--surface3);color:var(--text-muted);border-color:var(--border)}
  .badge-canceled{background:rgba(139,92,246,.12);color:var(--purple);border-color:rgba(139,92,246,.3)}

  /* Drawer */
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:40}
  .drawer-backdrop.open{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(560px,100vw);background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .25s;z-index:50;overflow-y:auto;display:flex;flex-direction:column;color:var(--text)}
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:20px 24px 12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .drawer-head h2{margin:0;font-size:18px;color:var(--text)}
  .drawer-body{padding:20px 24px;flex:1}
  .drawer-close{background:none;border:none;font-size:22px;color:var(--text-muted);cursor:pointer;line-height:1}
  .drawer-close:hover{color:var(--text)}
  .drawer-body strong{color:var(--text)}

  .runbook{background:var(--surface2);border:1px solid var(--border);border-left:4px solid var(--blue);padding:12px 16px;border-radius:6px;margin:12px 0;color:var(--text)}
  .runbook.sev-ERROR{border-left-color:var(--red);background:rgba(239,68,68,.06)}
  .runbook.sev-WARN{border-left-color:var(--yellow);background:rgba(251,191,36,.06)}
  .runbook.sev-CRITICAL{border-left-color:var(--red);background:rgba(239,68,68,.1)}
  .runbook h4{margin:0 0 6px 0;font-size:13px;font-weight:700;color:var(--text)}
  .runbook .label{font-size:11px;font-weight:600;color:var(--text-muted);margin-top:10px;text-transform:uppercase;letter-spacing:.05em}
  .runbook p{margin:2px 0;font-size:13px;white-space:pre-wrap;line-height:1.5;color:var(--text)}

  .error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 14px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}

  .run-row{display:grid;grid-template-columns:80px 1fr 100px 70px 60px;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center;color:var(--text)}
  .run-row:last-child{border-bottom:none}

  .inflight-row{display:grid;grid-template-columns:2fr 1fr 1fr 80px 80px;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;align-items:center;color:var(--text)}
  .inflight-row strong{color:var(--text)}
  .empty{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:13px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn-small{padding:6px 10px;font-size:12px}

  /* ---- Connector source theming ----
     Each card gets a 4px branded left border + a faint matching tint via
     the --conn-color custom prop set on the section. Make.com-ish: you
     can recognize an Amazon row at a glance even before reading. */
  .conn-section{margin-bottom:16px}
  .conn-section[data-connector="AMAZON_SP_API"]   { --conn-color: #ff9900; --conn-tint: rgba(255,153,0,.06) }
  .conn-section[data-connector="SHOPIFY"]         { --conn-color: #95bf47; --conn-tint: rgba(149,191,71,.06) }
  .conn-section[data-connector="WALMART"]         { --conn-color: #ffc220; --conn-tint: rgba(255,194,32,.06) }
  .conn-section[data-connector="QBO"],
  .conn-section[data-connector="QUICKBOOKS"]      { --conn-color: #2ca01c; --conn-tint: rgba(44,160,28,.06) }
  .conn-section[data-connector="ETSY"]            { --conn-color: #f1641e; --conn-tint: rgba(241,100,30,.06) }
  .conn-section[data-connector="EBAY"]            { --conn-color: #e53238; --conn-tint: rgba(229,50,56,.06) }
  /* fallback (any unknown connector) */
  .conn-section { --conn-color: var(--blue); --conn-tint: rgba(96,165,250,.06) }

  .conn-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-left:4px solid var(--conn-color);border-radius:8px 8px 0 0;cursor:pointer;user-select:none;font-size:13px;font-weight:600;color:var(--text)}
  .conn-header:hover{background:var(--surface3)}
  .conn-header .conn-icon{font-size:18px;line-height:1}
  .conn-header .conn-name{flex:1}
  .conn-header .conn-meta{color:var(--text-muted);font-weight:400;font-size:12px}
  .conn-section.collapsed .conn-header{border-radius:8px}
  .conn-section.collapsed .conn-body{display:none}
  .conn-body{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--surface);overflow:hidden}

  /* Endpoint cards (Phase 2 endpoint-first view) — themed via conn-section */
  .ep-card{padding:14px 16px;border-bottom:1px solid var(--border);border-left:4px solid transparent;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;transition:background .12s,border-left-color .12s}
  .ep-card:hover{background:var(--conn-tint);border-left-color:var(--conn-color)}
  .ep-card:last-child{border-bottom:none}
  .ep-card-icon{font-size:20px;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--conn-tint);border-radius:6px;border:1px solid var(--border)}
  .ep-card-title{font-size:14px;font-weight:600;color:var(--text)}
  .ep-card-sub{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ep-card-sub code{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);background:var(--surface2);padding:1px 6px;border-radius:3px}
  .ep-card-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;align-items:center}

  /* ---- Bundles strip (one-click recipes) ---- */
  .bundles-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .bundle-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--conn-color, var(--blue));border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;min-width:240px;cursor:pointer;transition:background .12s}
  .bundle-card[data-connector="AMAZON_SP_API"]   { --conn-color: #ff9900 }
  .bundle-card[data-connector="SHOPIFY"]         { --conn-color: #95bf47 }
  .bundle-card[data-connector="WALMART"]         { --conn-color: #ffc220 }
  .bundle-card[data-connector="QBO"],
  .bundle-card[data-connector="QUICKBOOKS"]      { --conn-color: #2ca01c }
  .bundle-card:hover{background:var(--surface2)}
  .bundle-card .bundle-name{font-weight:600;font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px}
  .bundle-card .bundle-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
  .bundle-card .bundle-meta{font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace}

  /* ---- Visual cron picker (drawer) ---- */
  .cron-picker{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:10px 0}
  .cron-picker select,.cron-picker input{padding:6px 10px;border:1px solid var(--border-strong);border-radius:5px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit}
  .cron-picker select:focus,.cron-picker input:focus{outline:none;border-color:var(--orange)}
  .cron-picker .cron-preview{grid-column:1/-1;color:var(--text-dim);font-size:11px;font-family:'Space Mono',monospace;padding:6px 10px;background:var(--surface2);border-radius:5px;border:1px solid var(--border)}

  /* Brand row inside endpoint drawer */
  .ep-brand-row{display:grid;grid-template-columns:12px 1fr 1fr 70px;gap:12px;padding:10px 0;border-top:1px solid var(--border);cursor:pointer;align-items:center;font-size:13px}
  .ep-brand-row:first-child{border-top:none}
  .ep-brand-row:hover{background:var(--surface2)}
  .ep-brand-row .name{font-weight:500;color:var(--text)}
  .ep-brand-row .meta{color:var(--text-muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Defaults box inside endpoint drawer */
  .ep-defaults{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:14px}
  .ep-defaults-row{display:grid;grid-template-columns:140px 1fr;gap:8px;padding:5px 0;font-size:12px}
  .ep-defaults-row .k{color:var(--text-muted)}
  .ep-defaults-row .v{color:var(--text);font-family:'Space Mono',monospace;font-size:11px;word-break:break-all}

  /* Drawer breadcrumb when drilling brand → endpoint */
  .drawer-back{display:inline-block;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:8px;text-decoration:none}
  .drawer-back:hover{color:var(--orange)}
</style>
</head>
<body data-page="jobs">
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Jobs</div>
        <div class="topbar-sub">Scheduled ingestion runners · Node-native</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="schedulerPill" class="scheduler-pill">Scheduler: loading…</span>
        <button class="btn btn-secondary" onclick="loadAll()">↻ Refresh</button>
      </div>
    </div>
    <div class="page-content">
      <div id="alertBox"></div>

      <!-- One-click bundles (recipes for provisioning + firing groups of jobs) -->
      <div id="bundlesContainer" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Bundles</span>
          <span style="color:var(--text-dim);font-size:11px">One-click recipes — provision + fire a group of jobs for a brand</span>
        </div>
        <div id="bundlesStrip" class="bundles-strip"></div>
      </div>

      <!-- Per-connector summary chips -->
      <div id="summaryStrip" class="summary-strip"></div>

      <!-- In-flight -->
      <div class="card" style="margin-bottom:18px">
        <h3 style="margin:0 0 12px 0;font-size:14px">
          Running now
          <span id="inflightCount" style="color:var(--text-muted);font-weight:400">(0)</span>
        </h3>
        <div id="inflightList"><div class="empty" style="padding:14px">No jobs currently running</div></div>
      </div>

      <!-- View toggle -->
      <div class="card" style="padding:8px 14px;margin-bottom:14px;display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em">View:</span>
        <button id="viewToggleEndpoint" class="btn btn-small" onclick="setView('endpoint')">📂 By endpoint</button>
        <button id="viewToggleBrand" class="btn btn-small btn-secondary" onclick="setView('brand')">📋 By brand</button>
        <button id="viewToggleProject" class="btn btn-small btn-secondary" onclick="setView('project')">📁 By project</button>
        <span style="flex:1"></span>
        <span id="viewHint" style="color:var(--text-dim);font-size:11px"></span>
      </div>

      <!-- Endpoint-first view (default) -->
      <div id="endpointView">
        <div class="card">
          <div class="toolbar">
            <input id="endpointSearchInput" type="search" placeholder="Search endpoints…" oninput="renderEndpoints()">
            <label><input type="checkbox" id="endpointShowInactive" onchange="renderEndpoints()"> Include inactive endpoints</label>
            <span style="flex:1"></span>
            <span id="endpointCount" style="color:var(--text-muted);font-size:12px"></span>
          </div>
          <div id="endpointContainer"></div>
        </div>
      </div>

      <!-- Project (folder) view — Folder System v1 (read-only) -->
      <div id="projectView" style="display:none">
        <div class="card">
          <div class="toolbar">
            <input id="projectSearchInput" type="search" placeholder="Search projects…" oninput="renderProjects()">
            <span style="flex:1"></span>
            <span id="projectCount" style="color:var(--text-muted);font-size:12px"></span>
          </div>
          <div id="projectContainer"></div>
        </div>
      </div>

      <!-- Tree (by-brand legacy view) -->
      <div id="brandView" style="display:none">
        <div class="card">
          <div class="toolbar">
            <input id="searchInput" type="search" placeholder="Search brand, endpoint, or connector…" oninput="renderTree()">
            <select id="filterStatus" onchange="renderTree()">
              <option value="">All statuses</option>
              <option value="RUNNING">Running</option>
              <option value="FAILED">Failed</option>
              <option value="SUCCESS">OK</option>
              <option value="NEW">Never run</option>
              <option value="PAUSED">Paused</option>
            </select>
            <label><input type="checkbox" id="showPaused" onchange="renderTree()"> Show paused</label>
            <span style="flex:1"></span>
            <button class="btn btn-secondary btn-small" onclick="expandAll(true)">Expand all</button>
            <button class="btn btn-secondary btn-small" onclick="expandAll(false)">Collapse all</button>
            <span id="jobCount" style="color:var(--text-muted);font-size:12px;margin-left:8px"></span>
          </div>
          <div id="treeContainer"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Drawer -->
  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <h2 id="drawerTitle">—</h2>
        <div id="drawerSub" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body" id="drawerBody">Loading…</div>
  </aside>

  <script src="/sidebar.js"></script>
  <script>
    let jobsCache = [];
    let endpointGroupsCache = [];
    let projectsCache = [];                              // [{ ProjectID, ProjectUID, Name, ... counts }]
    const projectDetailsCache = new Map();               // UID -> { project, endpoints, brands, jobs }
    const expandedProjects = new Set();                  // ProjectUIDs currently expanded inline
    const editingProjects = new Set();                   // ProjectUIDs in edit mode
    let endpointCatalogCache = [];                       // [{ EndpointUID, EndpointID, Name, DisplayName, ConnectorName, ... }]
    let brandCatalogCache = [];                          // [{ BrandUID, BrandName, IsActive }]
    let creatingProject = false;                         // toggled by the "+ New project" button
    let currentJobID = null;
    let currentEndpointID = null;       // when set, drawer shows endpoint detail
    let drawerStack = [];               // ['endpoint', endpointID] etc. for back-nav
    let pollTimer = null;
    let currentView = 'endpoint';       // 'endpoint' (default) | 'brand' | 'project'

    /* ---------- Formatters ---------- */
    const fmt = {
      rel(ts){
        if (!ts) return '—';
        const d = new Date(ts);
        const secs = Math.round((Date.now() - d.getTime())/1000);
        if (secs < 0)    return 'in ' + human(-secs);
        if (secs < 60)   return secs + 's ago';
        if (secs < 3600) return Math.round(secs/60) + 'm ago';
        if (secs < 86400)return Math.round(secs/3600) + 'h ago';
        return Math.round(secs/86400) + 'd ago';
      },
      dur(ms){
        if (ms == null) return '—';
        if (ms < 1000)  return ms + 'ms';
        if (ms < 60000) return (ms/1000).toFixed(1) + 's';
        return (ms/60000).toFixed(1) + 'm';
      },
      cron(expr){
        if (!expr) return 'manual';
        const map = {
          '* * * * *':      'every minute',
          '*/5 * * * *':    'every 5 min',
          '*/15 * * * *':   'every 15 min',
          '0 * * * *':      'every hour',
          '0 */2 * * *':    'every 2 hours',
          '0 */4 * * *':    'every 4 hours',
          '0 */6 * * *':    'every 6 hours',
          '0 */12 * * *':   'every 12 hours',
          '0 0 * * *':      'daily midnight',
          '0 8 * * *':      'daily 8am',
          '0 0 * * 0':      'weekly (Sun)'
        };
        return map[expr.trim()] || expr;
      }
    };
    function human(s){
      if (s < 60)    return s + 's';
      if (s < 3600)  return Math.round(s/60) + 'm';
      if (s < 86400) return Math.round(s/3600) + 'h';
      return Math.round(s/86400) + 'd';
    }
    function escape(s){
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s){ return escape(String(s).replace(/[:|]/g, '_')); }

    function alertError(msg){
      document.getElementById('alertBox').innerHTML =
        '<div class="alert alert-error" style="background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:6px;margin-bottom:12px">' + msg + '</div>';
      setTimeout(()=>{ document.getElementById('alertBox').innerHTML=''; }, 6000);
    }

    /* ---------- Collapse state (localStorage) ---------- */
    function isCollapsed(key){
      try { return localStorage.getItem('jobs.collapsed.' + key) === '1'; } catch (_) { return false; }
    }
    function setCollapsed(key, v){
      try { localStorage.setItem('jobs.collapsed.' + key, v ? '1' : '0'); } catch (_) {}
    }
    function toggleGroup(key){
      const safe = key.replace(/"/g, '\\"');
      const el = document.querySelector('[data-key="' + safe + '"]');
      if (!el) return;
      const willCollapse = !el.classList.contains('collapsed');
      el.classList.toggle('collapsed', willCollapse);
      setCollapsed(key, willCollapse);
    }
    function expandAll(expand){
      document.querySelectorAll('.tree-group, .tree-subgroup').forEach(el => {
        const key = el.getAttribute('data-key');
        el.classList.toggle('collapsed', !expand);
        if (key) setCollapsed(key, !expand);
      });
    }

    /* ---------- Status helper ---------- */
    function jobStatus(j){
      if (j.InFlight > 0) return 'RUNNING';
      if (!j.IsActive) return 'PAUSED';
      if (j.LastRunStatus === 'FAILED') return 'FAILED';
      if (j.LastRunStatus === 'SUCCESS') return 'SUCCESS';
      return 'NEW';
    }

    /* ---------- Connector branding ---------- */
    const CONNECTOR_ICON = {
      AMAZON_SP_API: '📦',
      SHOPIFY:       '🛍️',
      WALMART:       '🏪',
      QBO:           '💰',
      QUICKBOOKS:    '💰',
      ETSY:          '🎨',
      EBAY:          '🏷️',
    };
    const CONNECTOR_DEFAULT_ICON = '🔌';
    function connIcon(name){ return CONNECTOR_ICON[name] || CONNECTOR_DEFAULT_ICON; }

    /* ---------- Data load ---------- */
    async function loadAll(){
      await Promise.all([ loadScheduler(), loadJobs(), loadEndpointGroups(), loadBundles() ]);
    }

    /* ---------- Bundles strip ---------- */
    let bundlesCache = [];
    async function loadBundles(){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/bundles');
        bundlesCache = d.bundles || [];
        renderBundles();
      } catch (e) {
        // Silent — bundles is a non-critical surface, log to console
        console.warn('[bundles] load failed:', e.message);
        document.getElementById('bundlesContainer').style.display = 'none';
      }
    }
    function renderBundles(){
      const strip = document.getElementById('bundlesStrip');
      if (!bundlesCache.length) {
        document.getElementById('bundlesContainer').style.display = 'none';
        return;
      }
      document.getElementById('bundlesContainer').style.display = '';
      strip.innerHTML = bundlesCache.map(b => `
        <div class="bundle-card" data-connector="${escape(b.ConnectorScope || '')}"
             onclick="openBundleRunModal('${escapeAttr(b.Name)}')">
          <div class="bundle-name">
            <span>${connIcon(b.ConnectorScope)}</span>
            <span>${escape(b.DisplayName || b.Name)}</span>
          </div>
          <div class="bundle-desc">${escape((b.Description || '').slice(0, 140))}${(b.Description||'').length > 140 ? '…' : ''}</div>
          <div class="bundle-meta">${b.StepCount} step${b.StepCount === 1 ? '' : 's'} · ${escape(b.ConnectorScope || 'cross-connector')}</div>
        </div>
      `).join('');
    }

    /* ---------- Bundle run modal ---------- */
    async function openBundleRunModal(bundleName){
      // Pull a quick brand list to populate a picker. Use the existing
      // /api/brands endpoint that the brands.html page uses.
      let brands = [];
      try {
        const d = await window._SKCAdmin.api('GET', '/api/brands');
        brands = (d.brands || []).filter(b => b.IsActive !== false);
      } catch (e) {
        alertError('Could not load brand list: ' + e.message);
        return;
      }

      const bundle = bundlesCache.find(b => b.Name === bundleName);
      if (!bundle) return;

      const html = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:flex;align-items:center;justify-content:center" id="bundleModalBackdrop" onclick="closeBundleModal(event)">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:min(520px,92vw);max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
              <div>
                <h3 style="margin:0;color:var(--text);font-size:16px">${connIcon(bundle.ConnectorScope)} Run bundle</h3>
                <div style="color:var(--text-muted);font-size:12px;margin-top:3px">${escape(bundle.DisplayName || bundle.Name)}</div>
              </div>
              <button class="drawer-close" onclick="closeBundleModal()">×</button>
            </div>
            <p style="color:var(--text-muted);font-size:12px;line-height:1.5;margin:0 0 14px">${escape(bundle.Description || '')}</p>
            <label style="display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:6px">Brand</label>
            <select id="bundleBrandSelect" style="width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:12px">
              <option value="">— select a brand —</option>
              ${brands.map(b => `<option value="${escape(b.BrandUID)}">${escape(b.BrandName)}</option>`).join('')}
            </select>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:12px">
              <input type="checkbox" id="bundleDryRun"> Dry run — show plan without provisioning
            </label>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button class="btn btn-secondary" onclick="closeBundleModal()">Cancel</button>
              <button class="btn" id="bundleRunBtn" onclick="executeBundleRun('${escapeAttr(bundle.Name)}')">Run bundle</button>
            </div>
            <div id="bundleResult" style="margin-top:14px"></div>
          </div>
        </div>
      `;
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      document.body.appendChild(wrap.firstElementChild);
    }
    function closeBundleModal(e){
      if (e && e.target.id !== 'bundleModalBackdrop') return;
      const m = document.getElementById('bundleModalBackdrop');
      if (m) m.remove();
    }
    async function executeBundleRun(bundleName){
      const brandUID = document.getElementById('bundleBrandSelect').value;
      const dryRun = document.getElementById('bundleDryRun').checked;
      const result = document.getElementById('bundleResult');
      const btn = document.getElementById('bundleRunBtn');
      if (!brandUID) {
        result.innerHTML = '<div style="color:var(--red);font-size:12px">Select a brand first.</div>';
        return;
      }
      btn.disabled = true;
      btn.textContent = dryRun ? 'Computing…' : 'Running…';
      result.innerHTML = '<div style="color:var(--text-muted);font-size:12px">Calling /api/bundles/' + escape(bundleName) + '/run…</div>';
      try {
        const d = await window._SKCAdmin.api('POST', '/api/bundles/' + encodeURIComponent(bundleName) + '/run', {
          brandUID, dryRun,
        });
        if (d.dryRun) {
          result.innerHTML = '<div style="color:var(--text);font-size:12px;margin-bottom:6px"><strong>Plan</strong> for ' + escape(d.brandName) + ':</div>' +
            '<pre style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11px;color:var(--text);max-height:300px;overflow:auto">' + escape(JSON.stringify(d.plan, null, 2)) + '</pre>';
        } else {
          const created = (d.provisioned || []).filter(p => !p.skipped).length;
          const fired   = (d.fired || []).length;
          const skipped = (d.skipped || []).length;
          result.innerHTML = `
            <div style="color:var(--green);font-size:12px;margin-bottom:8px"><strong>✓ Done.</strong> ${created} provisioned · ${fired} firing · ${skipped} skipped.</div>
            <details style="font-size:11px;color:var(--text-muted)"><summary style="cursor:pointer">View full result</summary>
            <pre style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);max-height:300px;overflow:auto;margin-top:6px">${escape(JSON.stringify(d, null, 2))}</pre>
            </details>
          `;
          // Refresh the page data so new jobs show up
          loadAll();
        }
      } catch (e) {
        result.innerHTML = '<div style="color:var(--red);font-size:12px">Failed: ' + escape(e.message) + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run bundle';
      }
    }

    async function loadEndpointGroups(){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/jobs/by-endpoint');
        endpointGroupsCache = d.groups || [];
        renderEndpoints();
      } catch (e) {
        document.getElementById('endpointContainer').innerHTML =
          '<div class="empty">Failed to load endpoint view: ' + escape(e.message) + '</div>';
      }
    }

    /* ---------- Projects (Folder System v1 read + v2 edit) ---------- */
    async function loadProjects(){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/projects');
        projectsCache = d.projects || [];
        renderProjects();
        // Refresh details for any expanded projects so counts/jobs stay live.
        for (const uid of expandedProjects) loadProjectDetail(uid, /*silent=*/true);
      } catch (e) {
        const host = document.getElementById('projectContainer');
        if (host) host.innerHTML = '<div class="empty">Failed to load projects: ' + escape(e.message) + '</div>';
      }
    }

    async function ensureCatalogsLoaded(){
      // The "+ Add endpoint" and "+ Add brand" dropdowns need flat lists of
      // available endpoints + brands. Load once on demand and cache.
      const promises = [];
      if (!endpointCatalogCache.length) {
        promises.push(window._SKCAdmin.api('GET', '/api/endpoints')
          .then(d => { endpointCatalogCache = d.endpoints || d || []; })
          .catch(() => {}));
      }
      if (!brandCatalogCache.length) {
        promises.push(window._SKCAdmin.api('GET', '/api/brands')
          .then(d => { brandCatalogCache = d.brands || d || []; })
          .catch(() => {}));
      }
      if (promises.length) await Promise.all(promises);
    }

    async function loadProjectDetail(uid, silent){
      try {
        const d = await window._SKCAdmin.api('GET', '/api/projects/' + encodeURIComponent(uid));
        projectDetailsCache.set(uid, d);
        if (!silent) renderProjects();
        else if (currentView === 'project') renderProjects();   // background refresh
      } catch (e) {
        if (!silent) {
          const host = document.getElementById('projectContainer');
          if (host) host.innerHTML = '<div class="empty">Failed to load project: ' + escape(e.message) + '</div>';
        }
      }
    }

    function toggleProjectExpand(uid){
      if (expandedProjects.has(uid)) {
        expandedProjects.delete(uid);
        renderProjects();
      } else {
        expandedProjects.add(uid);
        if (!projectDetailsCache.has(uid)) loadProjectDetail(uid);
        else renderProjects();
      }
    }

    function setView(v){
      currentView = v;
      document.getElementById('endpointView').style.display = v === 'endpoint' ? '' : 'none';
      document.getElementById('brandView').style.display    = v === 'brand'    ? '' : 'none';
      document.getElementById('projectView').style.display  = v === 'project'  ? '' : 'none';
      // Toggle button styling
      document.getElementById('viewToggleEndpoint').classList.toggle('btn-secondary', v !== 'endpoint');
      document.getElementById('viewToggleBrand').classList.toggle('btn-secondary',    v !== 'brand');
      document.getElementById('viewToggleProject').classList.toggle('btn-secondary',  v !== 'project');
      try { localStorage.setItem('jobs.view', v); } catch (_) {}
      document.getElementById('viewHint').textContent =
          v === 'endpoint' ? 'Endpoints are profiles — defaults at the top, brands inherit. Click any endpoint for the brand list.'
        : v === 'brand'    ? 'Brands grouped under each endpoint. Click any brand row for run history.'
        :                    'Projects are folders that group endpoints + brands. Click a project to see its scope. (Read-only in v1.)';
      if (v === 'project' && !projectsCache.length) loadProjects();
    }

    /* ---------- Project folder cards ---------- */
    function renderProjects(){
      const host = document.getElementById('projectContainer');
      if (!host) return;
      const search = (document.getElementById('projectSearchInput')?.value || '').toLowerCase().trim();

      const visible = projectsCache.filter(p => {
        if (!search) return true;
        const hay = ((p.Name || '') + ' ' + (p.DisplayName || '') + ' ' +
                     (p.ConnectorScope || '') + ' ' + (p.Description || '')).toLowerCase();
        return hay.includes(search);
      });

      document.getElementById('projectCount').textContent =
        visible.length + ' of ' + projectsCache.length + ' project' + (projectsCache.length === 1 ? '' : 's');

      let html = '';

      // "+ New project" affordance + (when active) the inline create form
      html += '<div style="margin-bottom:14px">';
      if (!creatingProject) {
        html += '<button class="btn btn-small" onclick="startCreateProject()">＋ New project</button>';
      } else {
        html += renderCreateProjectForm();
      }
      html += '</div>';

      if (!projectsCache.length) {
        html += '<div class="empty">No projects yet. Click ＋ New project to create one.</div>';
      } else if (!visible.length) {
        html += '<div class="empty">No projects match the current search.</div>';
      } else {
        html += visible.map(p => renderProjectCard(p)).join('');
      }

      host.innerHTML = html;
    }

    function renderProjectCard(p){
      const uid = p.ProjectUID;
      const expanded = expandedProjects.has(uid);
      const editing  = editingProjects.has(uid);
      const display = escape(p.DisplayName || p.Name || '(unnamed)');
      const internal = p.DisplayName ? '<span style="color:var(--text-dim);font-size:11px;margin-left:8px">' + escape(p.Name) + '</span>' : '';
      const scope = p.ConnectorScope
        ? '<span style="background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">' + escape(p.ConnectorScope) + '</span>'
        : '<span style="color:var(--text-dim);font-size:11px">cross-connector</span>';

      const eCount   = p.EndpointCount        || 0;
      const bCount   = p.BrandCount           || 0;
      const jCount   = p.ManagedJobCount      || 0;
      const jActive  = p.ActiveManagedJobCount|| 0;

      const desc = p.Description
        ? '<div style="color:var(--text-muted);font-size:12px;margin-top:4px">' + escape(p.Description) + '</div>'
        : '';

      // Detail section if expanded
      let detail = '';
      if (expanded) {
        const cached = projectDetailsCache.get(uid);
        if (!cached) {
          detail = '<div class="empty" style="padding:14px">Loading project detail…</div>';
        } else {
          detail = renderProjectDetailBody(cached, editing);
        }
      }

      // Edit / Done-editing button — visible only when expanded.
      const editBtn = expanded
        ? '<button class="btn btn-small ' + (editing ? '' : 'btn-secondary') + '" ' +
            'style="margin-right:8px" ' +
            'onclick="event.stopPropagation();toggleProjectEditMode(\'' + escapeAttr(uid) + '\')">' +
            (editing ? '✓ Done' : '✏️ Edit') +
          '</button>'
        : '';

      return (
        '<div class="card" style="margin-bottom:10px;padding:0">' +
          '<div onclick="toggleProjectExpand(\'' + escapeAttr(uid) + '\')" ' +
               'style="cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:14px">' +
            '<span style="font-size:16px;width:14px;display:inline-block;color:var(--text-muted)">' + (expanded ? '▾' : '▸') + '</span>' +
            '<span style="font-size:18px">📁</span>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-weight:600">' + display + internal + '</div>' +
              desc +
            '</div>' +
            scope +
            '<span style="display:flex;gap:10px;color:var(--text-muted);font-size:12px;white-space:nowrap">' +
              '<span title="Endpoints">📂 ' + eCount + '</span>' +
              '<span title="Brands">🏷️ ' + bCount + '</span>' +
              '<span title="Managed jobs (active / total)">⚙️ ' + jActive + ' / ' + jCount + '</span>' +
            '</span>' +
            editBtn +
          '</div>' +
          (expanded ? '<div style="border-top:1px solid var(--border)">' + detail + '</div>' : '') +
        '</div>'
      );
    }

      const drift  = d.driftCandidates || [];

        '<tr>' +

          (editMode
            ? '<td style="padding:6px 10px"><input type="text" value="' + escape(e.CronExpression || '') + '" placeholder="cron expression" id="pe-cron-' + e.ProjectEndpointID + '" style="width:160px;font-family:monospace;font-size:11px;background:var(--surface-2,#1e1e2e);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px"></td>' +

              '<td style="padding:6px 10px;text-align:right;white-space:nowrap">' +
                '<label style="font-size:11px;margin-right:8px"><input type="checkbox" id="pe-active-' + e.ProjectEndpointID + '" ' + (e.IsActive ? 'checked' : '') + '> active</label>' +

                  : '<span style="color:var(--text-dim);font-size:11px">○ inactive</span>') +
              '</td>'

          '<td style="padding:6px 10px"><strong>' + escape(b.BrandName || '(unknown brand)') + '</strong>' +
            (b.BrandCategory ? ' <span style="color:var(--text-dim);font-size:11px">[' + escape(b.BrandCategory) + ']</span>' : '') +
          '</td>' +
          '<td style="padding:6px 10px;color:var(--text-dim);font-family:monospace;font-size:11px">' + escape(b.BrandUID) + '</td>' +
          '<td style="padding:6px 10px;text-align:right">' + (b.IsActive
              ? '<span style="color:var(--green);font-size:11px">● member</span>'
              : '<span style="color:var(--text-dim);font-size:11px">○ paused</span>') +
            (editMode ? ' <button class="btn btn-small btn-secondary" onclick="removeProjectBrand(\'' + escapeAttr(uid) + '\',' + b.ProjectBrandID + ',\'' + escapeAttr(b.BrandName || '') + '\')">Remove</button>' : '') +

        '</tr>'
      )).join('') : '<tr><td colspan="3" class="empty" style="padding:10px">No brands attached yet.</td></tr>';

      const jobRows = jobs.length ? jobs.map(j => {
        const statusColor =
            j.LastRunStatus === 'SUCCESS' ? 'var(--green)'
          : j.LastRunStatus === 'FAILED'  ? 'var(--red)'
          : j.LastRunStatus === 'RUNNING' ? 'var(--blue)'
          :                                  'var(--text-dim)';
        const statusLabel = j.LastRunStatus
          ? '<span style="color:' + statusColor + ';font-size:11px">● ' + escape(j.LastRunStatus.toLowerCase()) + '</span>'

      const sectionStyle = 'padding:14px 16px';
      const headerStyle  = 'font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:8px';
      const tableStyle   = 'width:100%;border-collapse:collapse;font-size:13px';

      // Edit-mode-only sections: header editor, add-endpoint form, add-brand form, danger zone
      const headerEditor = editMode ? renderProjectHeaderEditor(d.project) : '';
      const addEndpointForm = editMode ? renderAddEndpointForm(d.project) : '';
      const addBrandForm    = editMode ? renderAddBrandForm(d.project)    : '';
      const dangerZone      = editMode ? renderProjectDangerZone(d.project) : '';

          '<div style="' + headerStyle + '">Materialized jobs (' + jobs.length + ')</div>' +

        (editMode
          ? '<div style="padding:10px 16px;border-top:1px solid var(--border);background:rgba(99,102,241,.05);color:var(--text-muted);font-size:11px">' +

    /* ---------- Drift detector ----------
       Jobs that match this project's endpoints but aren't project-managed
       (custom cron, or managed by some other project). Surface so operator
       can see + reconcile. */
    function renderDriftSection(drift, sectionStyle, headerStyle, tableStyle){
      if (!drift || !drift.length) return '';
      const rows = drift.map(r => {
        const reasonLabel =
            r.DriftReason === 'cron-divergence'           ? '<span style="color:#fbbf24;font-size:11px">⚠ custom cron</span>'
          : r.DriftReason === 'managed-by-other-project'  ? '<span style="color:#a5b4fc;font-size:11px">↗ in another project</span>'
          :                                                 '<span style="color:var(--text-dim);font-size:11px">eligible</span>';
        return (
          '<tr>' +
            '<td style="padding:6px 10px"><strong>' + escape(r.EndpointDisplay || r.EndpointName) + '</strong>' +
              '<div style="color:var(--text-dim);font-size:11px">' + escape(r.JobType) + '</div>' +
            '</td>' +
            '<td style="padding:6px 10px">' + escape(r.BrandName || '?') + '</td>' +
            '<td style="padding:6px 10px;font-family:monospace;font-size:11px;color:var(--text-muted)">' +
              (r.JobCron ? escape(r.JobCron) : '—') +
              (r.JobCron && r.ProjectCron && r.JobCron !== r.ProjectCron
                ? '<div style="color:var(--text-dim);font-size:10px">project: ' + escape(r.ProjectCron) + '</div>'
                : '') +
            '</td>' +
            '<td style="padding:6px 10px">' + reasonLabel + '</td>' +
            '<td style="padding:6px 10px;text-align:right">' + (r.IsActive
                ? '<span style="color:var(--green);font-size:11px">on</span>'
                : '<span style="color:var(--text-dim);font-size:11px">paused</span>') +
            '</td>' +
          '</tr>'
        );
      }).join('');
      return (
        '<div style="' + sectionStyle + ';border-top:1px solid var(--border);background:rgba(251,191,36,.04)">' +
          '<div style="' + headerStyle + '">Drift detected (' + drift.length + ')</div>' +
          '<div style="color:var(--text-muted);font-size:11px;margin-bottom:8px">Jobs that use this project\'s endpoints but aren\'t project-managed. Add the brand to the project (will materialize a fresh managed job with the project\'s cron) or change the job\'s cron to match. Each path is operator-decided.</div>' +
          '<table style="' + tableStyle + '"><tbody>' + rows + '</tbody></table>' +
        '</div>'
      );
    }

    async function toggleProjectEditMode(uid){
      if (editingProjects.has(uid)) {
        editingProjects.delete(uid);
      } else {
        editingProjects.add(uid);
        // Lazy-load catalogs the first time anyone enters edit mode.
        await ensureCatalogsLoaded();
        // Make sure detail is loaded so the editor renders against real data.
        if (!projectDetailsCache.has(uid)) await loadProjectDetail(uid);
      }
      renderProjects();
    }

      const description    = document.getElementById('np-desc')?.value.trim();
      if (!name) { alertError('Name is required.'); return; }
